poses:
  1:
    name: "姿势1"
    description: "任务1： 清理桌面垃圾"
    whole_body_joints:
      # 腿部关节
      - 0.4
      - 1.1
      - 0.7
      - 0.0
      - 0.0
      
      # 头部关节
      - 0.0
      - 0.5
      
      # 左臂关节
      - 1.8
      - -1.50
      - -0.55
      - -2.3
      - 0.0
      - 0.0
      - 0.0
      
      # 右臂关节
      - -1.8
      - 1.50
      - 0.55
      - 2.3
      - 0.0
      - 0.0
      - 0.0
    
    # 底盘位置 (odom坐标系)
    base_x: 0.0
    base_y: 0.0
    base_yaw: 0.0
    
    # 坐标系设置
    frame_id: "base_link"
    reference_frame_id: "odom"
    
    # 时间参数
    base_time_s: 15.0


